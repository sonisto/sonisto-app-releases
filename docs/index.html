<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="See what's new in Sonisto — latest updates and improvements">
    <title>What's New — Sonisto</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08080f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: rgba(255, 255, 255, 0.93);
            -webkit-font-smoothing: antialiased;
        }

        .aurora {
            pointer-events: none;
            position: fixed;
            z-index: 0;
        }

        .aurora-bottom {
            inset-inline-start: 0;
            inset-inline-end: 0;
            bottom: 0;
            height: 75%;
            background: radial-gradient(ellipse 100% 65% at 50% 100%, rgba(124, 58, 237, 0.15), transparent 65%);
        }

        .aurora-top-right {
            width: 55%;
            height: 45%;
            top: -12%;
            right: -6%;
            background: radial-gradient(ellipse at center, rgba(6, 182, 212, 0.12), transparent 70%);
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo-icon {
            height: 50px;
            width: 150px;
            border-radius: 8px;
        }

        .header-logo-text {
            font-size: 15px;
            font-weight: 600;
        }

        .header-links {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-download {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: all 0.15s;
        }

        .header-download:hover {
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .hero {
            padding: 48px 0 32px;
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .hero p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }

        .releases {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .release-card {
            padding: 20px 24px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .release-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .release-version {
            font-size: 14px;
            font-weight: 600;
            color: #bf5af2;
        }

        .release-date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }

        .release-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 100px;
            background: rgba(191, 90, 242, 0.1);
            color: #bf5af2;
            border: 1px solid rgba(191, 90, 242, 0.2);
        }

        .release-body {
            font-size: 13.5px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.6);
        }

        .release-body h1,
        .release-body h2,
        .release-body h3 {
            color: rgba(255, 255, 255, 0.8);
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .release-body ul,
        .release-body ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .release-body li {
            margin: 4px 0;
        }

        .release-body code {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        .release-body pre {
            background: rgba(255, 255, 255, 0.05);
            padding: 14px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .release-body a {
            color: #bf5af2;
            text-decoration: underline;
        }

        .release-body p {
            margin: 8px 0;
        }

        .release-body img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .release-body > :first-child {
            margin-top: 0;
        }

        .skeleton-card {
            padding: 20px 24px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 25%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .skeleton-line.wide {
            width: 40%;
        }

        .skeleton-line.medium {
            width: 90%;
        }

        .skeleton-line.narrow {
            width: 60%;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .skeleton-line {
                animation: none;
                background: rgba(255, 255, 255, 0.06);
            }
        }

        .error-message,
        .empty-message {
            text-align: center;
            padding: 48px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .footer {
            padding: 32px 0;
            margin-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }

        .download-block {
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .download-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            align-self: flex-start;
            padding: 11px 22px;
            border-radius: 100px;
            font-size: 13.5px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(135deg, #bf5af2, #7c3aed);
            border: 1px solid rgba(191, 90, 242, 0.4);
            transition: all 0.15s;
        }

        .download-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .download-toggle {
            cursor: pointer;
            color: rgba(255, 255, 255, 0.45);
            font-size: 12px;
            list-style: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
            user-select: none;
            transition: color 0.15s;
        }

        .download-toggle:hover {
            color: rgba(255, 255, 255, 0.75);
        }

        .download-toggle::-webkit-details-marker {
            display: none;
        }

        .download-toggle::before {
            content: '▸';
            font-size: 10px;
            transition: transform 0.15s;
        }

        .download-details[open] .download-toggle::before {
            transform: rotate(90deg);
        }

        .download-groups {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 28px;
            margin-top: 12px;
        }

        .download-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .download-icon {
            flex-shrink: 0;
        }

        /* Apple glyph underfills its viewBox, so it needs to be a touch larger
           than the Windows glyph to appear the same optical size. */
        .download-icon.icon-mac {
            width: 16px;
            height: 16px;
        }

        .download-icon.icon-windows {
            width: 13px;
            height: 13px;
        }

        .download-primary .download-icon.icon-mac {
            width: 17px;
            height: 17px;
        }

        .download-primary .download-icon.icon-windows {
            width: 14px;
            height: 14px;
        }

        .download-group-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 2px;
        }

        .download-option {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            align-self: flex-start;
            padding: 7px 14px;
            border-radius: 100px;
            font-size: 12.5px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.15s;
        }

        .download-option:hover {
            color: #fff;
            border-color: rgba(191, 90, 242, 0.4);
            background: rgba(191, 90, 242, 0.08);
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding: 10px 0;
            }

            .header-links {
                gap: 8px;
            }

            .header-logo-icon {
                width: 150px;
                height: auto;
            }

            .hero h1 {
                font-size: 22px;
            }

            .release-card {
                padding: 16px 18px;
            }

            .container {
                padding: 0 16px;
            }
        }
    </style>
</head>
<body>
<!-- Aurora blobs -->
<div class="aurora aurora-bottom"></div>
<div class="aurora aurora-top-right"></div>

<div class="container">
    <header class="header">
        <div class="header-logo">
            <a class="header-link" href="https://sonisto.com" target="_blank" rel="noopener">
                <img class="header-logo-icon" src="logo-full.svg" alt="Sonisto">
            </a>
        </div>
        <div class="header-links">
            <a class="header-download" href="https://shop.sonisto.com" target="_blank" rel="noopener">
                Visit Shop
            </a>
            <a class="header-download" href="https://github.com/sonisto/sonisto-app-releases/releases/latest" target="_blank" rel="noopener">
                Download App
            </a>
        </div>
    </header>

    <section class="hero">
        <h1>What's New</h1>
        <p>Latest updates and improvements to Sonisto</p>
    </section>

    <div class="releases" id="releases"></div>

    <footer class="footer">
        &copy; Sonisto
    </footer>
</div>

<script>
  const REPO = 'sonisto/sonisto-app-releases';
  const API_URL = `https://api.github.com/repos/${REPO}/releases?per_page=100`;
  const releasesEl = document.getElementById('releases');

  function showLoading() {
    releasesEl.innerHTML = Array.from({ length: 3 }, () =>
      '<div class="skeleton-card"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line narrow"></div></div>'
    ).join('');
  }

  function showError() {
    releasesEl.innerHTML =
      '<div class="error-message">Unable to load release notes. Please try again later.</div>';
  }

  function showEmpty() {
    releasesEl.innerHTML =
      '<div class="empty-message">No releases yet — check back soon.</div>';
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '';
    return new Intl.DateTimeFormat('en-US', {
      year: 'numeric',
      month: 'long',
      day: 'numeric',
    }).format(d);
  }

  const SVG_NS = 'http://www.w3.org/2000/svg';
  const ICON_PATHS = {
    mac: 'M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z',
    windows: 'M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801',
  };

  function keyToOs(key) {
    return key === 'windows' ? 'windows' : 'mac';
  }

  function osIcon(os) {
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'currentColor');
    svg.setAttribute('class', 'download-icon icon-' + os);
    svg.setAttribute('aria-hidden', 'true');
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', ICON_PATHS[os]);
    svg.appendChild(path);
    return svg;
  }

  function buildInstallers(assets) {
    const out = {};
    for (const a of assets || []) {
      const name = (a.name || '').toLowerCase();
      if (name.endsWith('arm64.dmg')) {
        out.macArm = { label: 'macOS (Apple Silicon)', url: a.browser_download_url };
      } else if (name.endsWith('x64.dmg')) {
        out.macIntel = { label: 'macOS (Intel)', url: a.browser_download_url };
      } else if (name.endsWith('.exe')) {
        out.windows = { label: 'Windows', url: a.browser_download_url };
      }
    }
    return out;
  }

  function pickPrimaryKey(installers) {
    const ua = navigator.userAgent;
    if (/Windows/i.test(ua) && installers.windows) return 'windows';
    if (/Mac/i.test(ua)) {
      if (installers.macArm) return 'macArm';
      if (installers.macIntel) return 'macIntel';
    }
    return Object.keys(installers)[0] || null;
  }

  // macOS architecture is unreliable via userAgent (Safari reports Apple Silicon
  // as Intel), so default to Apple Silicon and refine to Intel when the browser
  // exposes a trustworthy architecture hint.
  async function refineMacArch(installers, primaryKey, apply) {
    if (primaryKey !== 'macArm' || !installers.macIntel) return;
    if (!navigator.userAgentData || !navigator.userAgentData.getHighEntropyValues) return;
    try {
      const data = await navigator.userAgentData.getHighEntropyValues(['architecture']);
      if (data.architecture === 'x86') apply('macIntel');
    } catch (e) { /* ignore — keep default */ }
  }

  function renderDownloadBlock(release) {
    const installers = buildInstallers(release.assets);
    const keys = Object.keys(installers);
    if (keys.length === 0) return null;

    const block = document.createElement('div');
    block.className = 'download-block';

    const primaryKey = pickPrimaryKey(installers);

    const primary = document.createElement('a');
    primary.className = 'download-primary';
    primary.target = '_blank';
    primary.rel = 'noopener';
    const setPrimary = (key) => {
      primary.href = installers[key].url;
      primary.innerHTML = '';
      primary.appendChild(osIcon(keyToOs(key)));
      const label = document.createElement('span');
      label.textContent = 'Download for ' + installers[key].label;
      primary.appendChild(label);
    };
    setPrimary(primaryKey);
    block.appendChild(primary);

    if (keys.length > 1) {
      const details = document.createElement('details');
      details.className = 'download-details';

      const summary = document.createElement('summary');
      summary.className = 'download-toggle';
      summary.textContent = 'Other platforms';
      details.appendChild(summary);

      const groupsWrap = document.createElement('div');
      groupsWrap.className = 'download-groups';

      const groups = [
        { label: 'macOS', keys: ['macArm', 'macIntel'] },
        { label: 'Windows', keys: ['windows'] },
      ];
      for (const group of groups) {
        const present = group.keys.filter(k => installers[k]);
        if (present.length === 0) continue;

        const groupEl = document.createElement('div');
        groupEl.className = 'download-group';

        const groupLabel = document.createElement('div');
        groupLabel.className = 'download-group-label';
        groupLabel.textContent = group.label;
        groupEl.appendChild(groupLabel);

        for (const key of present) {
          const opt = document.createElement('a');
          opt.className = 'download-option';
          opt.href = installers[key].url;
          opt.target = '_blank';
          opt.rel = 'noopener';
          opt.appendChild(osIcon(keyToOs(key)));
          const label = document.createElement('span');
          label.textContent = installers[key].label;
          opt.appendChild(label);
          groupEl.appendChild(opt);
        }
        groupsWrap.appendChild(groupEl);
      }
      details.appendChild(groupsWrap);
      block.appendChild(details);
    }

    refineMacArch(installers, primaryKey, setPrimary);
    return block;
  }

  function renderRelease(release, isLatest) {
    const card = document.createElement('div');
    card.className = 'release-card';

    const header = document.createElement('div');
    header.className = 'release-header';

    const version = document.createElement('span');
    version.className = 'release-version';
    version.textContent = release.tag_name;

    const date = document.createElement('span');
    date.className = 'release-date';
    date.textContent = formatDate(release.published_at);

    header.appendChild(version);
    header.appendChild(date);

    if (isLatest) {
      const badge = document.createElement('span');
      badge.className = 'release-badge';
      badge.textContent = 'Latest';
      header.appendChild(badge);
    }

    const body = document.createElement('div');
    body.className = 'release-body';
    body.innerHTML = marked.parse(release.body || '');

    card.appendChild(header);
    card.appendChild(body);

    if (isLatest) {
      const downloads = renderDownloadBlock(release);
      if (downloads) card.appendChild(downloads);
    }

    return card;
  }

  async function loadReleases() {
    showLoading();
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(res.statusText);
      const all = await res.json();
      const stable = all.filter(r => !r.prerelease && !r.draft);
      if (stable.length === 0) {
        showEmpty();
        return;
      }
      releasesEl.innerHTML = '';
      stable.forEach((release, i) => {
        releasesEl.appendChild(renderRelease(release, i === 0));
      });
    } catch(e) {
      console.log(e);
      showError();
    }
  }

  marked.use({
    renderer: {
      link({ href, title, text }) {
        const titleAttr = title ? ` title="${title}"` : '';
        return `<a href="${href}"${titleAttr} target="_blank" rel="noopener noreferrer">${text}</a>`;
      }
    }
  });

  loadReleases();
</script>
</body>
</html>
