<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="See what's new in Sonisto — latest updates and improvements">
    <title>What's New — Sonisto</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08080f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: rgba(255, 255, 255, 0.93);
            -webkit-font-smoothing: antialiased;
        }

        .aurora {
            pointer-events: none;
            position: fixed;
            z-index: 0;
        }

        .aurora-bottom {
            inset-inline-start: 0;
            inset-inline-end: 0;
            bottom: 0;
            height: 75%;
            background: radial-gradient(ellipse 100% 65% at 50% 100%, rgba(124, 58, 237, 0.15), transparent 65%);
        }

        .aurora-top-right {
            width: 55%;
            height: 45%;
            top: -12%;
            right: -6%;
            background: radial-gradient(ellipse at center, rgba(6, 182, 212, 0.12), transparent 70%);
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo-icon {
            height: 50px;
            width: 150px;
            border-radius: 8px;
        }

        .header-logo-text {
            font-size: 15px;
            font-weight: 600;
        }

        .header-links {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-download {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: all 0.15s;
        }

        .header-download:hover {
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .hero {
            padding: 48px 0 32px;
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .hero p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }

        .releases {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .release-card {
            padding: 20px 24px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .release-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .release-version {
            font-size: 14px;
            font-weight: 600;
            color: #bf5af2;
        }

        .release-date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }

        .release-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 100px;
            background: rgba(191, 90, 242, 0.1);
            color: #bf5af2;
            border: 1px solid rgba(191, 90, 242, 0.2);
        }

        .release-body {
            font-size: 13.5px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.6);
        }

        .release-body h1,
        .release-body h2,
        .release-body h3 {
            color: rgba(255, 255, 255, 0.8);
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .release-body ul,
        .release-body ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .release-body li {
            margin: 4px 0;
        }

        .release-body code {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        .release-body pre {
            background: rgba(255, 255, 255, 0.05);
            padding: 14px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .release-body a {
            color: #bf5af2;
            text-decoration: underline;
        }

        .release-body p {
            margin: 8px 0;
        }

        .release-body img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .release-body > :first-child {
            margin-top: 0;
        }

        .skeleton-card {
            padding: 20px 24px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 25%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .skeleton-line.wide {
            width: 40%;
        }

        .skeleton-line.medium {
            width: 90%;
        }

        .skeleton-line.narrow {
            width: 60%;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .skeleton-line {
                animation: none;
                background: rgba(255, 255, 255, 0.06);
            }
        }

        .error-message,
        .empty-message {
            text-align: center;
            padding: 48px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .footer {
            padding: 32px 0;
            margin-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding: 10px 0;
            }

            .header-links {
                gap: 8px;
            }

            .header-logo-icon {
                width: 150px;
                height: auto;
            }

            .hero h1 {
                font-size: 22px;
            }

            .release-card {
                padding: 16px 18px;
            }

            .container {
                padding: 0 16px;
            }
        }
    </style>
</head>
<body>
<!-- Aurora blobs -->
<div class="aurora aurora-bottom"></div>
<div class="aurora aurora-top-right"></div>

<div class="container">
    <header class="header">
        <div class="header-logo">
            <a class="header-link" href="https://sonisto.com" target="_blank" rel="noopener">
                <img class="header-logo-icon" src="logo-full.svg" alt="Sonisto">
            </a>
        </div>
        <div class="header-links">
            <a class="header-download" href="https://shop.sonisto.com" target="_blank" rel="noopener">
                Visit Shop
            </a>
            <a class="header-download" href="https://github.com/sonisto/sonisto-app-releases/releases/latest" target="_blank" rel="noopener">
                Download App
            </a>
        </div>
    </header>

    <section class="hero">
        <h1>What's New</h1>
        <p>Latest updates and improvements to Sonisto</p>
    </section>

    <div class="releases" id="releases"></div>

    <footer class="footer">
        &copy; Sonisto
    </footer>
</div>

<script>
  const REPO = 'sonisto/sonisto-app-releases';
  const API_URL = `https://api.github.com/repos/${REPO}/releases?per_page=100`;
  const releasesEl = document.getElementById('releases');

  function showLoading() {
    releasesEl.innerHTML = Array.from({ length: 3 }, () =>
      '<div class="skeleton-card"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line narrow"></div></div>'
    ).join('');
  }

  function showError() {
    releasesEl.innerHTML =
      '<div class="error-message">Unable to load release notes. Please try again later.</div>';
  }

  function showEmpty() {
    releasesEl.innerHTML =
      '<div class="empty-message">No releases yet — check back soon.</div>';
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '';
    return new Intl.DateTimeFormat('en-US', {
      year: 'numeric',
      month: 'long',
      day: 'numeric',
    }).format(d);
  }

  function renderRelease(release, isLatest) {
    const card = document.createElement('div');
    card.className = 'release-card';

    const header = document.createElement('div');
    header.className = 'release-header';

    const version = document.createElement('span');
    version.className = 'release-version';
    version.textContent = release.tag_name;

    const date = document.createElement('span');
    date.className = 'release-date';
    date.textContent = formatDate(release.published_at);

    header.appendChild(version);
    header.appendChild(date);

    if (isLatest) {
      const badge = document.createElement('span');
      badge.className = 'release-badge';
      badge.textContent = 'Latest';
      header.appendChild(badge);
    }

    const body = document.createElement('div');
    body.className = 'release-body';
    body.innerHTML = marked.parse(release.body || '');

    card.appendChild(header);
    card.appendChild(body);
    return card;
  }

  async function loadReleases() {
    showLoading();
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(res.statusText);
      const all = await res.json();
      const stable = all.filter(r => !r.prerelease && !r.draft);
      if (stable.length === 0) {
        showEmpty();
        return;
      }
      releasesEl.innerHTML = '';
      stable.forEach((release, i) => {
        releasesEl.appendChild(renderRelease(release, i === 0));
      });
    } catch(e) {
      console.log(e);
      showError();
    }
  }

  marked.use({
    renderer: {
      link({ href, title, text }) {
        const titleAttr = title ? ` title="${title}"` : '';
        return `<a href="${href}"${titleAttr} target="_blank" rel="noopener noreferrer">${text}</a>`;
      }
    }
  });

  loadReleases();
</script>
</body>
</html>
